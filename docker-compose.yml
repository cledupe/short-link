version: '3.8'

# ── Port Mappings (Host : Container) ──────────────────────────────
#  nginx    :8080 → :80    (LB entry point; serves SPA + proxies /api/*)
#  backend  :–     → :3000 (internal only; no host port exposed)
#  cassandra:–     → :9042 (internal only; CQL native transport)
#  redis    :–     → :6379 (internal only; in-memory cache + counter)
#  frontend :–     → :80   (internal only; assets available through LB)
# ── Test Networking ───────────────────────────────────────────────
# docker exec nginx ping -c 2 backend

services:
  # Cassandra cluster - NoSQL database for URL mapping storage
  # Port: 9042 (internal, CQL native transport)
  # Scale to 3 nodes: docker-compose up --scale cassandra=3
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=url_shortener
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      # Seed nodes - Docker Compose DNS resolves service name to all container IPs
      - CASSANDRA_SEEDS=cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      url_shortener_net:
        aliases:
          - cassandra-seed
    restart: unless-stopped

  # Redis cluster - in-memory cache (TTL 24h) + atomic ID counter via INCR
  # Port: 6379 (internal)
  # Cluster mode enabled with AOF persistence for durability
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    # For multi-node cluster mode: add --cluster-enabled yes --cluster-node-timeout 5000 and deploy 3+ nodes
    volumes:
      - redis_data:/data
    networks:
      url_shortener_net:
        aliases:
          - redis-cluster
    restart: unless-stopped

  # ── Init Services ──────────────────────────────────────────────────

  # Cassandra init - one-shot service that creates the keyspace after
  # Cassandra cluster is ready. Runs cqlsh in a retry loop (up to 60s).
  cassandra-init:
    image: cassandra:4.1
    depends_on:
      - cassandra
    volumes:
      - ./scripts/init-cassandra.cql:/init.cql
    networks:
      - url_shortener_net
    command: >
      sh -c "
        echo 'Waiting for Cassandra to be ready...' &&
        for i in \$$(seq 1 60); do
          if cqlsh cassandra 9042 -e 'describe cluster' 2>/dev/null; then
            echo 'Cassandra is ready. Creating keyspace...' &&
            cqlsh cassandra 9042 -f /init.cql &&
            echo 'Keyspace created successfully.' &&
            exit 0
          fi
          echo \"Waiting for Cassandra... attempt \$$i\" &&
          sleep 2
        done
        echo 'Failed to connect to Cassandra after 60 attempts (120s).' &&
        echo 'Check Cassandra logs: docker logs cassandra' &&
        exit 1
      "
    restart: "no"

  # Redis cluster init - one-shot service that forms the 3-node Redis
  # cluster. Waits for all nodes to respond to PING, then assigns slots.
  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      - redis
    volumes:
      - ./scripts/init-redis-cluster.sh:/scripts/init-redis-cluster.sh
    networks:
      - url_shortener_net
    command: sh /scripts/init-redis-cluster.sh
    restart: "no"

  # Backend API - Node.js Express server handling URL creation and redirection
  # Port: 3000 (internal, not exposed to host; nginx proxies requests)
  # Scale to 3 instances: docker-compose up --scale backend=3
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - PORT=3000
      - CASSANDRA_NODES=cassandra
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - url_shortener_net
    restart: unless-stopped

  # Nginx load balancer - entry point for all HTTP traffic
  # Port: 8080 (exposed to host) -> proxies to backend:3000 (internal)
  # Serves Vue.js SPA static assets + reverse-proxies /api/* to backend instances
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - url_shortener_net
    restart: unless-stopped

  # Prometheus - metrics collection and monitoring
  # Port: 9090 (Prometheus UI)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - url_shortener_net
    restart: unless-stopped

  # Grafana - dashboard visualization for Prometheus metrics
  # Port: 3001 (mapped to container port 3000 to avoid conflict with backend)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana-provisioning:/etc/grafana/provisioning/datasources:ro
    networks:
      - url_shortener_net
    restart: unless-stopped

  # Grafana Loki - log aggregation
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - url_shortener_net
    restart: unless-stopped

  # Promtail - Docker log collector
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - url_shortener_net
    restart: unless-stopped

networks:
  url_shortener_net:
    driver: bridge

volumes:
  cassandra_data:
    driver: local
  redis_data:
    driver: local
