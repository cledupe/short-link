worker_processes auto;
worker_rlimit_nofile 65535;

events {
    multi_accept on;
    worker_connections 10240;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format upstream_time '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log upstream_time;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_max_body_size 10k;
    client_body_timeout 10s;
    send_timeout 10s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # ── Rate Limiting Zones ───────────────────────────────────────────
    # API: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # ── WAF: Block common attack patterns ────────────────────────────
    # SQL injection, XSS, path traversal, command injection
    map $request_uri $is_attack {
        default                                       0;
        "~*(?i)(union\s+select|select\s+.*from)"      1;
        "~*(?i)(<script|alert\(|onerror=|onload=)"    1;
        "~*(?i)(\.\./|\.\.\\|/etc/passwd|/proc/self)" 1;
        "~*(?i)(exec\s*\(|system\s*\(|eval\s*\()"     1;
    }

    # ── Backend Upstream (Least-Connections Load Balancing) ─────────
    # Algorithm: least_conn — routes each request to the backend with the
    # fewest active connections. Optimal for variable-length requests (URL
    # creation vs redirect) where connection count better reflects load than
    # round-robin.
    #
    # Servers:
    #   Docker Compose DNS resolves `backend` to all container IPs when
    #   scaled via `--scale backend=3`. Each instance runs on port 3000.
    #
    # Failure detection:
    #   max_fails=3   — mark server down after 3 consecutive failures
    #   fail_timeout=10s — retry after 10 seconds
    upstream backend {
        least_conn;
        # health_check interval=30s fails=3 passes=2;
        # Connection pooling — keep 32 idle keepalive connections to backends
        keepalive 32;
        server backend:3000 max_fails=3 fail_timeout=10s;
        server backend:3000 max_fails=3 fail_timeout=10s;
        server backend:3000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health and readiness probes (exact match, highest priority)
        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /ready {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Short URL redirects — match alphanumeric shortIds
        location ~ ^/[a-zA-Z0-9]+$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            if ($is_attack) {
                return 403;
            }

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE, PUT" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

proxy_connect_timeout 5s;  # Time to establish upstream connection
            proxy_read_timeout 30s;    # Time to receive response from upstream
            proxy_send_timeout 10s;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;

            proxy_intercept_errors on;
        }

        # Proxied health check — tests backend through the load balancer
        location /api/health {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
            access_log off;
            proxy_pass http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 502 /502.html;
        location = /502.html {
            internal;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            log_not_found off;
            access_log off;
        }

        location ~* \.(json|map)$ {
            expires 1d;
            add_header Cache-Control "public";
            log_not_found off;
            access_log off;
        }
    }
}